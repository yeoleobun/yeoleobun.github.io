baseURL = 'https://yeoleobun.github.io/blog/' 
copyright = "yeoleobun" # cactus will use title if copyright is not set
disqusShortname = "yeoleobun-github-io" # Used when comments is enabled. Cactus will use site title if not set
languageCode = 'zh-cn' 
theme = "cactus" 
title = "yeoleobun's blog" 

# Main menu which appears below site header.
[[menu.main]]
name = "Home"
url = "/"
weight = 1

[[menu.main]]
name = "Writings"
url = "/posts"
weight = 2

[[menu.main]]
name = "Tags"
url = "/tags"
weight = 3

# [[menu.main]]
# name = "About"
# url = "/about"
# weight = 4

[markup]
[markup.highlight]
codeFences = true
guessSyntax = false
hl_Lines = ""
lineNoStart = 1
lineNos = true
lineNumbersInTable = false
noClasses = true
style = "lovelace"
tabWidth = 4

[params]

colortheme = "white" # dark, light, white, or classic
googleAnalyticsAsync = false # use asynchronous tracking. Synchronous tracking by default
rss = true # generate rss feed. default value is false
showAllPostsArchive = false # default

# Home page settings
description = "" 
mainSection = "posts" # your main section
mathjax = true # not required
postsOnHomePage = 10 # this option will be ignored if showAllPostsOnHomePage is set to true
projectsUrl = "https://github.com/gohugoio" # title link for projects list
showAllPostsOnHomePage = true # default
showProjectsList = false # show projects list by default (if projects data file exists).
tagsOverview = true # show tags overview by default.

# https://gohugo.io/functions/format/#hugo-date-and-time-templating-reference
dateFormat = "2006-01-02" # default

# Post page settings
showReadTime = false # default
show_updated = true # default

[params.comments]
enabled = true # default
engine = "disqus" # only disqus, utterances, and cactus_comments is supported

# the value of name should be an valid font awesome icon name (brands type)
# https://fontawesome.com/icons?d=gallery&s=brands
[[params.social]]
link = "https://github.com/yeoleobun"
name = "github"
[[params.social]]
link = "yangli245@live.com" # no need for "mailto:" in the head
name = "杨力"
